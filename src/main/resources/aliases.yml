# ============================================================================
#  CommandAliases - Alias Definitions
# ============================================================================
# Each alias is an entry under the `aliases:` section with a unique key
# (numeric or arbitrary name).
#
# --- Required fields ---
#   command:  The custom command name (and optional arguments).
#             Examples:
#               command: hello           -> /hello (no arguments)
#               command: "pay <player>"  -> /pay with one argument
#
#   execute:  The real command to dispatch when the alias is used.
#
# --- Placeholders (supported in `execute`) ---
#   %executer%            Replaced with the name of the player who ran the alias.
#
#   %<argname>%           Custom placeholder — name it anything you want.
#                         Declare <name> in command, use %name% in execute.
#                         Example: command: "giveitem <player> <amount>"
#                                  execute: "give %player% apple %amount%"
#                                  -> /giveitem Steve 5  -runs-  give Steve apple 5
#                         Works with any name: <reason> → %reason%, <item> → %item%, etc.
#
#   PluginName:command    (no placeholder, but a special syntax)
#                         When multiple plugins register the same command name,
#                         prefix with the plugin name and a colon to target a
#                         specific plugin's command.
#                         E.g. execute: "MyPlugin:reward"
#
# --- Optional fields ---
#   permission:           Permission node required to use this alias.
#                         If omitted, anyone can use the alias.
#
#   permission-default:   Default access level for the permission node.
#                         Values: true, false, op (default: op)
#                         Only relevant when `permission` is set.
#
#   permission-message:   Custom message shown when the sender lacks permission.
#                         Supports & color codes.
#                         Falls back to the plugin-wide default if omitted.
#
#   sound:                Sound to play when the alias is executed.
#                         Must be a valid Bukkit Sound enum name (e.g. ENTITY_EXPERIENCE_ORB_PICKUP).
#                         See: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Sound.html
#
#   sound-pitch:          Pitch of the sound (0.5 - 2.0, default: 1.0).
#
#   sound-volume:         Volume of the sound (default: 1.0).
# ============================================================================

aliases:

  # =======================
  #  BASIC
  # =======================

  # /claimreward -> /crate reward
  claimreward:
    command: claimreward
    execute: "give %executer% apple 1"

  # /showping -> /ping <player>
  showping:
    command: showping
    execute: "ping %executer%"

  # =======================
  #  WITH ARGUMENTS
  # =======================

  # /tip <player> <amount> -> /eco pay <player> <amount>
  tip:
    command: "tip <player> <amount>"
    execute: "eco pay %player% %amount%"

  # /report <player> <reason> -> /mail send StaffAlert Report: %player% - %reason%
  report:
    command: "report <player> <reason>"
    execute: "mail send StaffAlert &cReport: &f%player% &8- &f%reason%"

  # =======================
  #  WITH PERMISSION
  # =======================

  # /broadcastmsg <message> — staff broadcast
  broadcastmsg:
    command: "broadcastmsg <message>"
    execute: "say &6[&eBroadcast&6] &f%message%"
    permission: commandaliases.broadcast
    permission-default: op
    permission-message: "&cOnly administrators can broadcast."

  # /lockdown — toggle server lockdown (admin only)
  lockdown:
    command: lockdown
    execute: "whitelist toggle"
    permission: commandaliases.lockdown
    permission-default: op
    permission-message: "&4You don't have permission to toggle lockdown."

  # =======================
  #  PLUGIN-QUALIFIED DISPATCH
  # =======================

  # /claimkit — force LoyaltyCrates:kit when Essentials also has /kit
  claimkit:
    command: claimkit
    execute: "LoyaltyCrates:kit"

  # /pvptoggle — force CombatPlugin:pvp when another plugin conflicts
  pvptoggle:
    command: pvptoggle
    execute: "CombatPlugin:pvp"

  # =======================
  #  WITH CUSTOM SOUND
  # =======================

  # /redeem — play a sound when used
  redeem:
    command: redeem
    execute: "crate vote"
    permission: commandaliases.redeem
    permission-default: false
    permission-message: "&6You don't have any votes to redeem."
    sound: ENTITY_PLAYER_LEVELUP
    sound-pitch: 1.5
    sound-volume: 1.0

  # /dailybonus — play a sound on claim
  dailybonus:
    command: "dailybonus <code>"
    execute: "crate key %executer% %code%"
    sound: ENTITY_EXPERIENCE_ORB_PICKUP
    sound-pitch: 1.2
    sound-volume: 0.8
